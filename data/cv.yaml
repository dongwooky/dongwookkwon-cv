summary: >-
  Highly accomplished AI Research Engineer specializing in Large Language
  Model (LLM) optimization, Multi-Agent Systems (MAS), and AI-driven anomaly
  detection for critical infrastructure. Demonstrated research excellence
  through co-first authored publications in top-tier peer-reviewed venues,
  including an Oral presentation at EMNLP 2025 and a paper at ACL 2026 (both
  Industry Tracks), developed in collaboration with LG Electronics. Inventor
  of multiple registered patents in network and medical device anomaly
  detection. A core engineer who engineered and delivered a critical
  agent-based codebase for a mission-critical vehicle control data project for
  Hyundai Motor Company. With foundational research experience in nuclear
  cybersecurity and
  medical cyber-physical systems, poised to significantly advance the United
  States' technological edge in critical and emerging fields by engineering
  scalable, reliable, and secure autonomous AI architectures.

